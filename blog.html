<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - The Doipyyy Dimension</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #f4f4f4;
        }
        header {
            background: #2a2a2a;
            color: #fff;
            padding: 2rem 0;
            text-align: center;
            border-bottom: 3px solid #ff4500;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 2rem 0;
        }
        a {
            color: #ff4500;
            text-decoration: none;
        }
        /* New styling specific to blog posts */
        .blog-post {
            background: #2a2a2a;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border-left: 4px solid #ff4500;
        }
        .post-date {
            color: #aaaaaa;
            font-size: 0.9em;
            margin-bottom: 10px;
            display: block;
        }
        .blog-post h3 {
            margin-top: 0;
            color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Doipyyy Dimension</h1>
        <p>Dev logs, server updates, and personal thoughts.</p>
        <nav style="margin-top: 15px;">
            <a href="index.html" style="margin-right: 15px; font-weight: bold;">Home</a> 
            <a href="blog.html" style="margin-right: 15px; font-weight: bold;">Blog</a>
            <a href="servers.html" style="margin-right: 15px; font-weight: bold;">Servers</a>
            <a href="videos.html" style="font-weight: bold;">Videos</a>
        </nav>
    </header>

<div class="container">
        <h2>Latest Updates</h2>
        
        <div id="blog-posts-container">
            <p style="color: #aaaaaa;">Loading the latest dimension logs...</p>
        </div>
    </div>

    <script>
        // 1. Define your Contentful credentials
        const SPACE_ID = 'dd71a5uebgrd';
        const ACCESS_TOKEN = 'gbIUByaKgrFFwJaRv_M4uJhB-Sy7-cljqVS4xiDiOJQ';
        
        // 2. The Contentful API URL
        const URL = `https://cdn.contentful.com/spaces/${SPACE_ID}/environments/master/entries?content_type=blogPost`;

        // 3. Fetch the data from the CMS
        fetch(URL, {
            headers: {
                'Authorization': `Bearer ${ACCESS_TOKEN}`
            }
        })
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('blog-posts-container');
            container.innerHTML = ''; // Clear the "Loading..." text

            // 4. Loop through each post and create the HTML
            data.items.forEach(item => {
                // Extract the data from Contentful's JSON structure
                const title = item.fields.title;
                const date = new Date(item.fields.date).toLocaleDateString();
                const content = item.fields.content;

                // Build the HTML block for the post
                const postHTML = `
                    <div class="blog-post">
                        <h3>${title}</h3>
                        <span class="post-date">${date}</span>
                        <p>${content}</p>
                    </div>
                `;
                
                // Add the new block to the webpage
                container.innerHTML += postHTML;
            });
        })
        .catch(error => {
            console.error('Error fetching posts:', error);
            document.getElementById('blog-posts-container').innerHTML = '<p>Failed to load posts. The dimension is currently unstable.</p>';
        });
    </script>

</body>
</html>
